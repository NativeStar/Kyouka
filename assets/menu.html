<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
  </head>
  <body>
  <!-- 避免使用强制rtl时自身被影响 反正没i18n需求 -->
  <dialog id="root" dir="ltr">
    <span id="tooltip" hidden>
      tooltip
    </span>
    <div id="menuTitleBar" class="keepCursor">
      <span id="titleText" style="cursor: move;"></span>
      <button class="itemButton" id="closeButton" style="z-index: 999999;height: 100%;">X</button>
    </div>
    <div id="menuContainer">
      <div id="toolTypeSelect">
        <button class="itemButton typeButton typeSelected" targetType="document">文档</button>
        <button class="itemButton typeButton" targetType="program">程序</button>
        <button class="itemButton typeButton" targetType="tool">工具</button>
        <button class="itemButton typeButton" targetType="joy">娱乐</button>
        <button class="itemButton typeButton" targetType="about">帮助</button>
      </div>
      <div class="toolList" type="document">
        <button class="itemButton toolButton" tool="controllableAllMedia" tooltip="为所有audio和video元素恢复控制条并修复下载和(视频)画中画支持\n并不保证添加后就能正常控制 可能还要手动处理元素被隐藏、z-index过低等情况">音视频控制器</button>
        <button class="itemButton toolButton" tool="editPage" tooltip="像修改文本一样修改网页内容\n再次点击可关闭">自由编辑</button>
        <button class="itemButton toolButton" tool="enableAllElement" tooltip="移除所有元素的'disabled'属性">启用所有元素</button>
        <button class="itemButton toolButton" tool="removeInputLimit" tooltip="移除以下所有限制项:\n数字、日期输入框的范围和只读限制\n文本输入框的长度和只读限制\n文件上传框格式限制">移除输入限制</button>
        <button class="itemButton toolButton" tool="showHiddenElements" tooltip="显示通过hidden属性隐藏的元素">显示隐藏元素(hidden)</button>
        <button class="itemButton toolButton" tool="forceTranslate" tooltip="移除元素的'translate'属性\n当该属性为'no'时 元素内容不会被翻译">强制翻译</button>
        <button class="itemButton toolButton" tool="showDisplayNoneElements" tooltip="显示通过'display:none'样式隐藏的元素">显示隐藏元素(display)</button>
        <button class="itemButton toolButton" tool="wheelRemoveElement" tooltip="通过鼠标中键(按下滚轮)移除所指的元素\n并不一定准确 错删刷新网页即可\n再次点击可关闭">中键移除</button>
        <button class="itemButton toolButton" tool="forceOpenInNewTab" tooltip="强制所有a标签超链接使用新标签页打开">强制新标签</button>
        <button class="itemButton toolButton" tool="forceRTL" tooltip="强制使用RTL(右到左)布局\n再次点击可恢复">强制RTL</button>
        <button class="itemButton toolButton" tool="disableSpellCheck" tooltip="移除所有spellcheck属性">关闭拼写检查</button>
        <button class="itemButton toolButton" tool="removeWatermark" tooltip="实验性功能 移除符合特征的元素\n可能存在严重误判漏判">移除页面水印</button>
        <button class="itemButton toolButton" tool="removeWatermarkEnchant" tooltip="实验性功能 移除符合特征的元素并尝试防止恢复\n可能存在严重误判漏判">增强移除水印</button>
        <button class="itemButton toolButton" tool="removeElement" tooltip="移除页面中指定的元素">移除指定元素</button>
      </div>
      <div class="toolList" type="program" style="display: none;">
        <button class="itemButton toolButton" tool="forcePropertyRW" tooltip="强制修改设置属性时的\nwritable和configurable为true">强制可配置</button>
        <button class="itemButton toolButton" tool="blockOpen" tooltip="屏蔽所有open调用\n不能完全作为阻止重定向使用">屏蔽open</button>
        <button class="itemButton toolButton" tool="logJsonOperation" tooltip="将页面所有JSON操作打印至控制台\n(stringify parse rawJSON方法调用)">打印JSON操作</button>
        <button class="itemButton toolButton" tool="logBase64Operation" tooltip="将页面所有base64操作打印至控制台\n(即atob和btoa调用)">打印base64操作</button>
        <button class="itemButton toolButton" tool="blockConsole" tooltip="阻止调用console进行日志输出">屏蔽日志</button>
        <button class="itemButton toolButton" tool="blockSendBeacon" tooltip="阻止调用navigator.sendBeacon并打印其调用参数\n通常用于离开页面前上报数据">屏蔽sendBeacon</button>
        <button class="itemButton toolButton" tool="dispatchLoadEvent" tooltip="触发load事件监听器\n用于调试页面初始化">伪造load</button>
        <button class="itemButton toolButton" tool="dispatchBeforeunloadEvent" tooltip="触发beforeunload事件监听器\n用于调试相关功能">伪造beforeunload</button>
        <button class="itemButton toolButton" tool="blockClose" tooltip="屏蔽close函数调用\n阻止页面关闭自身 但可能无法阻止主动关闭子窗口">屏蔽close</button>
        <button class="itemButton toolButton" tool="dispatchCustomEvent" tooltip="在window对象上分发指定事件\n仅建议使用blur等无参数事件 否则可能导致异常">伪造自定义事件</button>
        <button class="itemButton toolButton" tool="logRandomUuid" tooltip="在控制台打印通过crypto.randomUUID生成的UUID\n该方法可能使用的并不算多">打印UUID</button>
        <button class="itemButton toolButton" tool="logCreateObjectURL" tooltip="在控制台打印通过createObjectURL方法生成的对象URL\n可在控制台点击直接查看内容">打印对象URL</button>
        <button class="itemButton toolButton" tool="logPostMessage" tooltip="打印对window.postMessage方法的调用\n(对Worker 其他window的postMessage无效)">打印postMessage</button>
        <button class="itemButton toolButton" tool="logMathRandom" tooltip="在控制台打印通过Math.random生成的随机数">打印随机数</button>
        <button class="itemButton toolButton" tool="blockShare" tooltip="使navigator.share方法调用不触发系统分享并返回成功">屏蔽share</button>
      </div>
      <div class="toolList" type="tool" style="display: none;">
        <button class="itemButton toolButton" tool="injectScript" tooltip="在页面中添加新的script元素实现执行">注入本地JS</button>
        <button class="itemButton toolButton" tool="injectOnlineScript" tooltip="加载指定URL的代码后执行\n可能被跨域政策或CSP阻止加载">注入网络JS</button>
        <button class="itemButton toolButton" id="injectCssByExtension" tooltip="读取内容后通过chrome.scripting.insertCSS执行">注入本地CSS</button>
        <button class="itemButton toolButton" tool="injectOnlineCss" tooltip="加载网络上的CSS文件\n可能被跨域政策或CSP阻止加载">注入网络CSS</button>
        <button class="itemButton toolButton" tool="openEyeDropper" tooltip="获取选中像素的颜色RGB值">屏幕取色</button>
        <button class="itemButton toolButton" tool="becomeDocumentPictureInPicture" tooltip="将页面使用文档画中画显示\n可能会有很多问题">转为画中画</button>
        <button class="itemButton toolButton" tool="recordCanvas" tooltip="60帧录制canvas渲染内容并保存至本地\n如果存在多个canvas将自动选择尺寸最大且可见的">录制Canvas</button>
        <button class="itemButton toolButton" tool="recordCanvasWithAudio" tooltip="60帧录制canvas渲染内容并保存至本地\n同时申请录音应对游戏录制等情况\n如果存在多个canvas将自动选择尺寸最大且可见的">录制Canvas并录音</button>
        <button class="itemButton toolButton" tool="dumpCache" tooltip="导出页面主动缓存的数据">转储缓存</button>
        <button class="itemButton toolButton" id="exportStorageExtension" tooltip="将LocalStorage SessionStorage Cookie导出为csv表格\n(Indexdb等由于支持复杂对象存储 暂无法导出)">导出存储数据</button>
        <button class="itemButton toolButton" tool="speakText" tooltip="使用浏览器TTS模块朗读输入的文本">朗读文本</button>
        <button class="itemButton toolButton" id="persistCookieByExtension" tooltip="将所有Cookie改为390天后过期\n可在服务器不校验的前提下保持登录态\n暂无法处理iframe cookie">持久化Cookie</button>
      </div>
      <div class="toolList" type="joy" style="display: none;"> 
        <button class="itemButton toolButton" tool="playAudio" tooltip="选择本地音频文件播放\n除刷新或关闭页面外无法中断播放">播放音频</button>
        <button class="itemButton toolButton" tool="webBackground" tooltip="选择本地图片文件作为当前网页背景\n可能只在部分页面有效">修改网页背景</button>
        <button class="itemButton toolButton" tool="changePageIcon" tooltip="将网页icon改为指定的本地图片">修改网页图标</button>
        <button class="itemButton toolButton" tool="changeTitle" tooltip="修改标签页显示的标题">修改标题</button>
        <button class="itemButton toolButton" tool="copyPageIconUrl" tooltip="将页面图标URL复制到剪切板">复制网页图标URL</button>
        <button class="itemButton toolButton" tool="changePageIconOnline" tooltip="将网页icon改为指定的网络图片\n可能被跨域政策或CSP阻止加载">修改网页图标(网络)</button>
        <button class="itemButton toolButton" tool="copyTitle" tooltip="修改标签页显示的标题">复制标题</button>
        <button class="itemButton toolButton" tool="closePageConfirm" tooltip="离开页面时弹出二次确认\n不保证所有浏览器都能生效">离开页面确认</button>
        <button class="itemButton toolButton" tool="pageInfo" tooltip="统计并显示一些页面相关信息\n准确性一般 仅供参考">页面信息</button>
        <button class="itemButton toolButton" tool="clientInfo" tooltip="统计浏览器和部分设备数据">客户端信息</button>
      </div>
      <div class="toolList" type="about" style="display: none;">
        <button class="itemButton toolButton" id="openSettingPage">打开设置</button>
        <button class="itemButton helpButton" helpText="该项目主要用于开发调试和辅助工具 请勿用于页面逆向等违法工作\n由于使用了较新的API外加懒得适配 可能无法在较老版本Chrome和移动端浏览器上正常工作\n更多功能请通过设置页操作">使用须知</button>
        <button class="itemButton helpButton" helpText="默认快捷键\nAlt+M切换显示/关闭菜单\nAlt+Shift+M重置菜单位置并切换显示/关闭">快捷键</button>
        <button class="itemButton helpButton" helpText="选择本地JavaScript文件并注入页面\n如被CSP阻止导致注入失败可在扩展设置页开启'移除CSP限制'功能">注入JS</button>
        <button class="itemButton helpButton" helpText="部分DOM相关功能(如'移除输入限制' '启用所有元素')在面对现代UI框架时可能无效\n因为它们不一定依赖HTML本身的属性实现功能">DOM操作相关</button>
        <button class="itemButton helpButton" helpText="移除后具体如何数据处理取决于网页本身代码\n且异常的数据大概率被后端拦截">移除输入限制</button>
        <button class="itemButton helpButton" helpText="显示所有被隐藏的元素\n该功能可能破坏页面布局!">显示隐藏元素</button>
        <button class="itemButton helpButton" helpText="部分页面会非常频繁的调用这两个方法 某些情况下会造成性能问题 多清空日志即可\n如果发现打印了奇怪的对象 可能是某些polyfill库在探测API实现 通常不必理会">打印JSON操作</button>
        <button class="itemButton helpButton" helpText="由于一些特性 对btoa方法的打印输出可能为乱码">打印base64操作</button>
        <button class="itemButton helpButton" helpText="由于实现原理是直接复制DOM 画中画页面会有各种问题\n且该功能本身限制较多 实用性一般">转为画中画</button>
        <button class="itemButton helpButton" helpText="用于录制一些表格 页游等通过Canvas绘制的内容\n部分情况下由于页面本身功能实现差别 可能出现透明背景、丢失内容、提早结束等异常情况\n带音频录制为实验功能">录制Canvas</button>
        <button class="itemButton helpButton" helpText="该功能还能解决某些控制台检测\n注意这并不是完全屏蔽输出 抛出异常或请求失败的错误仍会显示">屏蔽日志</button>
        <button class="itemButton helpButton" helpText="移除所有忽略指针事件且带zIndex参数的元素\n增强功能会在执行移除前Hook相关方法阻止符合规则的元素被追加\n该功能不易维护且难以避免漏(误)判 如问题过多后续可能删除">移除水印</button>
        <button class="itemButton helpButton" helpText="方便调试页面的事件监听器\n自定义事件仅支持不带参数的事件(如pagehide blur等)\n注意某些扩展的监听器也会被触发且可能发生异常 (毕竟正常不会有多次load之类事件)\n且此类由脚本创建的事件可能被页面忽略">伪造事件</button>
        <button class="itemButton helpButton" helpText="将页面通过caches API存储的数据导出至指定文件夹下\n会在选择的目录下创建网站域名文件夹\n并将文件写入与存储桶同名的子文件夹内\n暂时没考虑优化 速度会很慢">转储缓存</button>
        <button class="itemButton helpButton" helpText="在控制台点击打印的URL可直接查看数据\n如果在查看前该URL对应资源已被释放则可能无法正常查看">打印对象URL</button>
      </div>
    </div>
  </dialog>
</body>

</html>
