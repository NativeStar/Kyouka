<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kyouka Settings</title>
</head>

<body>
    <div style="display: flex;flex-direction: column;">
        <span>建议在扩展设置页中关闭'收集各项错误'选项 避免误判影响使用</span>
        <option-checkbox settingKey="enableGui" description="注入扩展GUI"></option-checkbox>
        <option-checkbox settingKey="removeCsp" description="移除CSP限制(严重破坏安全性 建议仅在必要时启用)"></option-checkbox>
        <option-checkbox settingKey="bypassConsoleDetect" description="绕过控制台检测"></option-checkbox>
        <option-checkbox settingKey="blockClipboardWrite" description="屏蔽剪切板写入"></option-checkbox>
        <option-checkbox settingKey="disableFont" description="屏蔽页面加载自定义字体"></option-checkbox>
        <option-checkbox settingKey="blockConsole" description="阻止控制台输出(可能绕过部分控制台检测)"></option-checkbox>
        <option-checkbox settingKey="printStackInLogs" description="页面输出日志时附带调用栈"></option-checkbox>
        <option-checkbox settingKey="enableContextMenu" description="启用扩展右键菜单功能"></option-checkbox>
        <option-checkbox settingKey="stringDetectBypass" description="尝试绕过基于字符串的Hook检测"></option-checkbox>
        <span>下列功能由于不完善或对原生行为破坏严重 可能导致页面异常</span>
        <option-checkbox settingKey="blockError" description="屏蔽未捕获异常监听"></option-checkbox>
        <option-checkbox settingKey="blockStringCodeExecute" description="阻止动态执行字符串形式代码(覆盖不完全)"></option-checkbox>
        <option-checkbox settingKey="allowContextMenu" description="阻止拦截右键菜单"></option-checkbox>
        <option-checkbox settingKey="disableCacheApi" description="屏蔽缓存API"></option-checkbox>
        <option-checkbox settingKey="blockServiceWorker" description="屏蔽注册ServiceWorker"></option-checkbox>
        <option-checkbox settingKey="blockStorageOperation" description="屏蔽Storage修改操作"></option-checkbox>
        <option-select settingKey="changeLanguageLocation" description="模拟语言及时区" optionsList='["en-US:美国","ja-JP:日本","ko-KR:韩国","ru-RU:俄罗斯","en-GB:英国","en-SG:新加坡","fr-FR:法国","en-IN:印度"]'></option-select>
    </div>
    <a href="https://github.com/NativeStar/Kyouka" target="_blank">项目仓库</a>
</body>
<script src="options.js"></script>
<style>
    option-checkbox option-select {
        display: flex;
        flex-direction: row;
    }
    html, body {
        overscroll-behavior: none;
        touch-action: manipulation;
    }
    * {
        user-select: none;
        -webkit-user-drag: none;
    }
    a{
        cursor: pointer;
        color: blue;
        text-decoration: none;
    }
    a:hover{
        text-decoration: underline;
        color: pink;
    }
</style>

</html>
